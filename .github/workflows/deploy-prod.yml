name: Build Prod Image & Deploy (Frontend)

on:
  push:
    branches: ["main", "master"]

jobs:
  build-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker Image Tag
        id: tag
        run: |
          IMAGE_NAME="quidpath_frontend"
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:prod-${TIMESTAMP}"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Generated Docker image tag: $IMAGE_TAG"

      - name: Build and Push Docker Image (Prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64/v8
          # NEXT_PUBLIC_* vars are baked into the bundle at build time
          build-args: |
            NEXT_PUBLIC_API_GATEWAY_URL=${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL }}
            NEXT_PUBLIC_BILLING_URL=${{ secrets.NEXT_PUBLIC_BILLING_URL }}
            NEXT_PUBLIC_INVENTORY_URL=${{ secrets.NEXT_PUBLIC_INVENTORY_URL }}
            NEXT_PUBLIC_CRM_URL=${{ secrets.NEXT_PUBLIC_CRM_URL }}
            NEXT_PUBLIC_HRM_URL=${{ secrets.NEXT_PUBLIC_HRM_URL }}
            NEXT_PUBLIC_POS_URL=${{ secrets.NEXT_PUBLIC_POS_URL }}
            NEXT_PUBLIC_PROJECTS_URL=${{ secrets.NEXT_PUBLIC_PROJECTS_URL }}
            NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY_PROD }}

      - name: Encode docker-compose.yml
        id: compose
        run: |
          if [ ! -f "docker-compose.yml" ]; then
            echo "Error: docker-compose.yml not found!"
            exit 1
          fi
          COMPOSE_B64=$(base64 -w 0 docker-compose.yml)
          echo "b64=$COMPOSE_B64" >> $GITHUB_OUTPUT

      - name: Trigger Prod Deployment in Infra Repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: stevendegwa/infra
          event-type: deploy-app
          client-payload: |
            {
              "app_repo": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "env": "prod",
              "sha": "${{ github.sha }}",
              "image_tag": "${{ steps.tag.outputs.image_tag }}",
              "docker_compose_b64": "${{ steps.compose.outputs.b64 }}",
              "env_secrets": {}
            }
