services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: qpfrontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
    networks:
      - quidpath_network

networks:
  quidpath_network:
    external: true
